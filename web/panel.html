<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bilive-chat — Panel</title>
    <link rel="stylesheet" href="/panel.css">
</head>
<body>
    <header>
        <h1>bilive-chat</h1>
        <div id="status" class="status-badge">connecting...</div>
    </header>

    <main>
        <section class="card">
            <h2>Connection</h2>
            <div id="conn-info">Not connected</div>
            <div class="actions-row">
                <button id="btn-start" class="btn">Start</button>
                <button id="btn-stop" class="btn btn-danger" disabled>Stop</button>
                <span id="conn-error" class="hint hint-error"></span>
            </div>
        </section>

        <section class="card">
            <h2>OBS Overlay URL</h2>
            <div class="url-row">
                <code id="obs-url"></code>
                <button id="copy-url" class="btn btn-small">Copy</button>
            </div>
            <span id="copy-status" class="hint"></span>
        </section>

        <section class="card">
            <h2>Room Config</h2>
            <form id="config-form">
                <div class="field">
                    <label for="cfg-room">Room ID</label>
                    <input type="number" id="cfg-room" min="0" placeholder="0">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">Save</button>
                    <span id="config-status" class="hint"></span>
                </div>
            </form>
        </section>

        <section class="card">
            <h2>Login Cookie</h2>
            <form id="login-form">
                <div class="field">
                    <label for="login-cookie">Cookie String</label>
                    <input type="text" id="login-cookie" placeholder="SESSDATA=...; bili_jct=...">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">Save Cookie</button>
                    <button type="button" id="delete-cookie" class="btn btn-danger">Delete</button>
                    <span id="login-status" class="hint"></span>
                </div>
            </form>
        </section>

        <section class="card">
            <h2>Filters</h2>
            <div class="field">
                <label>Blocked Users</label>
                <div id="blocked-users" class="tag-list"></div>
                <form id="add-user-form" class="tag-add-form">
                    <input type="text" id="add-user-input" placeholder="username">
                    <button type="submit" class="btn btn-small">Add</button>
                </form>
            </div>
            <div class="field">
                <label>Blocked Keywords</label>
                <div id="blocked-keywords" class="tag-list"></div>
                <form id="add-keyword-form" class="tag-add-form">
                    <input type="text" id="add-keyword-input" placeholder="keyword">
                    <button type="submit" class="btn btn-small">Add</button>
                </form>
            </div>
            <span id="filter-status" class="hint"></span>
        </section>

        <section class="card">
            <h2>Event Log</h2>
            <div id="messages"></div>
        </section>
    </main>

    <script src="/panel.js"></script>
</body>
</html>
