<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bilive-chat — Panel</title>
    <link rel="stylesheet" href="/panel.css">
</head>
<body>
    <h1>bilive-chat</h1>
    <div id="status">connecting...</div>

    <h2>Room</h2>
    <form id="config-form">
        <label>Room ID <input type="number" id="cfg-room"></label>
        <button type="submit">Save</button>
        <span id="config-status"></span>
    </form>

    <h2>Login Cookie</h2>
    <form id="login-form">
        <label>Cookie <input type="text" id="login-cookie" placeholder="paste cookie here"></label>
        <button type="submit">Save Cookie</button>
        <button type="button" id="delete-cookie">Delete Cookie</button>
        <span id="login-status"></span>
    </form>

    <h2>Events</h2>
    <div id="messages"></div>

    <script src="/panel.js"></script>
</body>
</html>
